  <style>
    :root{--bg:#0f0f11;--surface:#17171a;--border:#2a2a30;--accent:#c8a96e;--done:#6ec87a;--text:#e8e6e0;--muted:#7a7870;--red:#c86e6e;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.6;padding:0 0 60px;min-height:100vh;}
    a.back{display:inline-flex;align-items:center;gap:8px;padding:24px 64px 0;font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);text-decoration:none;letter-spacing:0.1em;}
    a.back:hover{color:var(--accent);}
    header{padding:32px 64px 24px;border-bottom:1px solid var(--border);}
    .tag{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:0.18em;color:var(--accent);text-transform:uppercase;margin-bottom:10px;}
    h1{font-family:'DM Serif Display',serif;font-size:clamp(28px,4vw,42px);font-weight:400;line-height:1.15;margin-bottom:8px;}
    h1 em{font-style:italic;color:var(--accent);}
    .meta{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);}

    .filter-bar{max-width:760px;margin:24px auto 0;padding:0 24px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
    .filter-btn{padding:6px 14px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s;text-transform:uppercase;letter-spacing:0.05em;}
    .filter-btn:hover{border-color:var(--accent);color:var(--accent);}
    .filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(200,169,110,0.08);}

    .stats{max-width:760px;margin:20px auto 0;padding:0 24px;display:flex;justify-content:space-between;font-family:'DM Mono',monospace;font-size:12px;}
    .stat-mastered{color:#9ec86e;}
    .stat-good{color:var(--done);}
    .stat-fail{color:var(--red);}
    .stat-rem{color:var(--accent);}

    .progress-outer{max-width:760px;margin:8px auto 0;padding:0 24px;}
    .progress-inner{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--done));width:0%;transition:width 0.4s ease;}

    .card-wrap{perspective:1500px;max-width:760px;margin:32px auto 0;padding:0 24px;}
    .card{position:relative;width:100%;min-height:340px;transition:transform 0.6s;transform-style:preserve-3d;cursor:pointer;}
    .card.flipped{transform:rotateY(180deg);}
    .face{position:absolute;width:100%;min-height:340px;backface-visibility:hidden;-webkit-backface-visibility:hidden;border-radius:12px;padding:36px 40px;display:flex;flex-direction:column;justify-content:center;background:var(--surface);border:1px solid var(--border);}
    .face.back{transform:rotateY(180deg);background:linear-gradient(135deg,#1a1a1f,#161618);border-color:rgba(200,169,110,0.35);}
    .card-cat{font-family:'DM Mono',monospace;font-size:11px;color:var(--accent);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:18px;text-align:center;}
    .card-content{font-size:17px;line-height:1.55;text-align:center;}
    .card-content.back-content{font-size:15px;line-height:1.7;text-align:left;}
    .card-hint{position:absolute;bottom:16px;left:0;right:0;text-align:center;font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em;}

    .controls{max-width:760px;margin:28px auto 0;padding:0 24px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
    .btn{padding:10px 20px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;letter-spacing:0.05em;cursor:pointer;transition:all 0.2s;text-transform:uppercase;}
    .btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);transform:translateY(-1px);}
    .btn:disabled{opacity:0.35;cursor:not-allowed;}
    .btn.primary{border-color:rgba(200,169,110,0.6);color:var(--accent);}
    .btn.success{border-color:rgba(110,200,122,0.5);color:var(--done);}
    .btn.success:hover{background:rgba(110,200,122,0.08);border-color:var(--done);}
    .btn.fail{border-color:rgba(200,110,110,0.5);color:var(--red);}
    .btn.fail:hover{background:rgba(200,110,110,0.08);border-color:var(--red);}

    .small-controls{max-width:760px;margin:16px auto 0;padding:0 24px;display:flex;gap:12px;justify-content:center;}
    .small-btn{padding:6px 12px;background:transparent;border:none;color:var(--muted);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:0.08em;}
    .small-btn:hover{color:var(--accent);}

    .complete{max-width:760px;margin:32px auto 0;padding:40px 36px;text-align:center;background:linear-gradient(135deg,rgba(110,200,122,0.07),rgba(200,169,110,0.04));border:1px solid rgba(110,200,122,0.3);border-radius:16px;display:none;}
    .complete-emoji{font-size:52px;line-height:1;margin-bottom:16px;}
    .complete h2{font-family:'DM Serif Display',serif;font-size:32px;font-weight:400;color:var(--done);margin-bottom:6px;}
    .complete-sub{font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);margin-bottom:28px;letter-spacing:0.05em;}
    .complete-stars{font-size:30px;letter-spacing:4px;margin-bottom:28px;}
    .complete-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
    .complete-cell{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:10px;padding:16px 10px;}
    .complete-cell.c-mastered{border-color:rgba(158,200,110,0.35);}
    .complete-cell.c-known{border-color:rgba(110,200,122,0.3);}
    .complete-cell.c-fail{border-color:rgba(200,110,110,0.3);}
    .complete-cell-val{font-family:'DM Serif Display',serif;font-size:36px;font-weight:400;line-height:1;margin-bottom:6px;}
    .c-mastered .complete-cell-val{color:#9ec86e;}
    .c-known .complete-cell-val{color:var(--done);}
    .c-fail .complete-cell-val{color:var(--red);}
    .complete-cell-lbl{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;}
    .complete-msg{font-size:14px;color:var(--muted);margin-bottom:24px;line-height:1.6;}

    @media(max-width:700px){header,a.back{padding-left:24px;padding-right:24px;}.face{padding:28px 24px;}.card-content{font-size:15px;}}
    .bottom-home-nav{position:fixed;bottom:0;left:0;right:0;z-index:90;background:var(--surface);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;padding:10px 16px;}
    .bottom-home-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 24px;border:1px solid rgba(200,169,110,0.3);border-radius:5px;color:var(--accent);font-family:'DM Mono',monospace;font-size:12px;text-decoration:none;transition:border-color 0.2s,background 0.2s;}
    .bottom-home-btn:hover{border-color:var(--accent);background:rgba(200,169,110,0.07);}
    .retry-badge{position:absolute;top:14px;right:14px;font-family:'DM Mono',monospace;font-size:10px;color:var(--red);background:rgba(200,110,110,0.12);border:1px solid rgba(200,110,110,0.25);border-radius:3px;padding:2px 7px;letter-spacing:0.05em;}
    .saved-info{max-width:760px;margin:6px auto 0;padding:0 24px;text-align:center;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);}
    .saved-info span{color:var(--done);}
    .small-btn-reset{color:var(--red)!important;opacity:0.8;}
    .small-btn-reset:hover{opacity:1;}
  </style>
